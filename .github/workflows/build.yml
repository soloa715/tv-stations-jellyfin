name: Build and Release

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Publish
        run: dotnet publish --configuration Release --no-build --output ./publish

  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Publish plugin
        run: dotnet publish --configuration Release --output ./publish -p:Version=${{ steps.version.outputs.VERSION }}.0

      - name: Create ZIP archive
        run: |
          cd publish
          zip -j ../jellyfin-plugin-tvstations_${{ steps.version.outputs.VERSION }}.0.zip Jellyfin.Plugin.TvStations.dll
          cd ..

      - name: Compute MD5 checksum
        id: checksum
        run: |
          CHECKSUM=$(sha256sum jellyfin-plugin-tvstations_${{ steps.version.outputs.VERSION }}.0.zip | awk '{print $1}')
          echo "CHECKSUM=$CHECKSUM" >> $GITHUB_OUTPUT

      - name: Update manifest.json
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}.0"
          CHECKSUM="${{ steps.checksum.outputs.CHECKSUM }}"
          SOURCE_URL="https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.VERSION }}/jellyfin-plugin-tvstations_${VERSION}.zip"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          python3 - << PYEOF
          import json, sys

          with open('manifest.json') as f:
              manifest = json.load(f)

          entry = manifest[0]
          new_version = {
              "version": "${VERSION}",
              "changelog": "See https://github.com/${{ github.repository }}/releases/tag/v${{ steps.version.outputs.VERSION }}",
              "targetAbi": "10.11.0.0",
              "sourceUrl": "${SOURCE_URL}",
              "checksum": "${CHECKSUM}",
              "timestamp": "${TIMESTAMP}"
          }

          # Replace or prepend version entry
          versions = entry.get("versions", [])
          versions = [v for v in versions if v["version"] != "${VERSION}"]
          versions.insert(0, new_version)
          entry["versions"] = versions

          with open('manifest.json', 'w') as f:
              json.dump(manifest, f, indent=2)
              f.write('\n')
          PYEOF

      - name: Commit updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git commit -m "chore: update manifest for v${{ steps.version.outputs.VERSION }}" || echo "No changes to commit"
          git push origin HEAD:main || echo "Could not push manifest update"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: jellyfin-plugin-tvstations_${{ steps.version.outputs.VERSION }}.0.zip
          generate_release_notes: true
          body: |
            ## Installation

            1. In Jellyfin dashboard → Plugins → Repositories → Add
            2. URL: `https://raw.githubusercontent.com/${{ github.repository }}/main/manifest.json`
            3. Catalog → TV Stations → Install
            4. Restart Jellyfin

            Movie channels start at **100**, Show channels start at **200**.
