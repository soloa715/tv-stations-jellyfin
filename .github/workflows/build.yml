name: Build and Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - run: dotnet restore
      - run: dotnet build --configuration Release --no-restore
      - run: dotnet publish --configuration Release --no-build --output ./publish

  release:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Read version from csproj
        id: version
        run: |
          VERSION=$(grep -oP '(?<=<Version>)[^<]+' Jellyfin.Plugin.TvStations.csproj)
          # csproj uses 1.0.8.0 → tag uses v1.0.8
          TAG="v${VERSION%.0}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=$TAG" >> $GITHUB_OUTPUT

      - name: Check if release already exists
        id: check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ steps.version.outputs.TAG }}")
          echo "EXISTS=$([ "$STATUS" = "200" ] && echo true || echo false)" >> $GITHUB_OUTPUT

      - name: Publish plugin
        if: steps.check.outputs.EXISTS == 'false'
        run: dotnet publish --configuration Release --output ./publish -p:Version=${{ steps.version.outputs.VERSION }}

      - name: Create ZIP archive
        if: steps.check.outputs.EXISTS == 'false'
        run: |
          zip -j jellyfin-plugin-tvstations_${{ steps.version.outputs.VERSION }}.zip \
            publish/Jellyfin.Plugin.TvStations.dll

      - name: Compute MD5 checksum
        id: checksum
        if: steps.check.outputs.EXISTS == 'false'
        run: |
          CHECKSUM=$(md5sum jellyfin-plugin-tvstations_${{ steps.version.outputs.VERSION }}.zip | awk '{print $1}')
          echo "CHECKSUM=$CHECKSUM" >> $GITHUB_OUTPUT

      - name: Update manifest.json
        if: steps.check.outputs.EXISTS == 'false'
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          TAG="${{ steps.version.outputs.TAG }}"
          CHECKSUM="${{ steps.checksum.outputs.CHECKSUM }}"
          SOURCE_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/jellyfin-plugin-tvstations_${VERSION}.zip"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          python3 - << PYEOF
          import json

          with open('manifest.json') as f:
              manifest = json.load(f)

          entry = manifest[0]
          new_version = {
              "version": "${VERSION}",
              "changelog": "See https://github.com/${{ github.repository }}/releases/tag/${TAG}",
              "targetAbi": "10.11.0.0",
              "sourceUrl": "${SOURCE_URL}",
              "checksum": "${CHECKSUM}",
              "timestamp": "${TIMESTAMP}"
          }

          versions = entry.get("versions", [])
          versions = [v for v in versions if v["version"] != "${VERSION}"]
          versions.insert(0, new_version)
          entry["versions"] = versions

          with open('manifest.json', 'w') as f:
              json.dump(manifest, f, indent=2)
              f.write('\n')
          PYEOF

      - name: Commit updated manifest
        if: steps.check.outputs.EXISTS == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git commit -m "chore: update manifest for ${{ steps.version.outputs.TAG }}" || echo "No changes to commit"
          git push origin HEAD:main || echo "Could not push manifest update"

      - name: Create GitHub Release
        if: steps.check.outputs.EXISTS == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: ${{ steps.version.outputs.TAG }}
          files: jellyfin-plugin-tvstations_${{ steps.version.outputs.VERSION }}.zip
          generate_release_notes: true
          body: |
            ## Installation

            1. In Jellyfin dashboard → Plugins → Repositories → Add
            2. URL: `https://raw.githubusercontent.com/${{ github.repository }}/main/manifest.json`
            3. Catalog → TV Stations → Install
            4. Restart Jellyfin

            Movie channels start at **100**, Show channels start at **200**.
